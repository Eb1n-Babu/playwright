<!DOCTYPE html>
<html>
<head>
  <title>Playwright Demo</title>
</head>
<body>
  <h2>Login Form</h2>
  <label for="username">Username</label>
  <input id="username" type="text" aria-label="Username"><br><br>

  <label for="password">Password</label>
  <input id="password" type="password" aria-label="Password"><br><br>

  <button aria-label="Login">Login</button><br><br>

  <h3>Options</h3>
  <label><input type="checkbox"> Accept Terms</label><br>
  <label><input type="radio" name="gender"> Male</label>
  <label><input type="radio" name="gender"> Female</label><br><br>

  <label for="country">Country</label>
  <select id="country">
    <option value="India">India</option>
    <option value="USA">USA</option>
    <option value="UK">UK</option>
  </select><br><br>

  <label for="search">Search</label>
  <input id="search" type="text" aria-label="Search"><br><br>

  <canvas id="canvas" width="300" height="200" style="border:1px solid black;"></canvas>
</body>
</html>
